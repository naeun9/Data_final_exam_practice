<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터패턴인식 기말 총정리</title>
<script>
window.MathJax = { tex: { inlineMath: [['\\(', '\\)']], displayMath: [['$$', '$$']] } };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
:root{
  --bg:#f4f5f7; --surface:#ffffff; --ink:#1c2230; --muted:#5a6273;
  --line:#e2e5eb; --brand:#3b4cca; --brand-ink:#2c3aa8;
  --ok-bg:#e7f5ee; --ok-line:#1f9d63; --ok-ink:#13653f;
  --code-bg:#1e2230; --code-ink:#e7eaf3;
  --focus:#1f63ff; --radius:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#11141b; --surface:#1a1e29; --ink:#eef1f7; --muted:#a3acbe;
    --line:#2b3140; --brand:#8b9bff; --brand-ink:#aab6ff;
    --ok-bg:#10261c; --ok-line:#34c27d; --ok-ink:#7ee2b0;
    --code-bg:#0c0e15; --code-ink:#e3e7f2; --focus:#7aa2ff;
  }
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto;}
  *{transition:none !important; animation:none !important;}
}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  line-height:1.65; color:var(--ink); background:var(--bg);
  margin:0; padding:0 16px 80px;
}
.skip{position:absolute; left:-9999px; top:0; background:var(--brand); color:#fff; padding:10px 16px; border-radius:0 0 8px 0; z-index:50;}
.skip:focus{left:0;}
.wrap{max-width:840px; margin:0 auto;}
header{padding:56px 0 28px; text-align:center;}
header .eyebrow{font-size:.8rem; letter-spacing:.14em; text-transform:uppercase; color:var(--brand); font-weight:700;}
header h1{font-size:clamp(1.7rem,5vw,2.5rem); line-height:1.2; margin:.4em 0 .25em; letter-spacing:-.02em;}
header p{color:var(--muted); margin:0; font-size:.95rem;}

nav.toc{
  position:sticky; top:0; z-index:20; background:var(--bg);
  display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
  padding:14px 0; margin-bottom:18px; border-bottom:1px solid var(--line);
}
nav.toc a{
  font-size:.85rem; font-weight:600; text-decoration:none; color:var(--muted);
  padding:7px 13px; border:1px solid var(--line); border-radius:999px; background:var(--surface);
}
nav.toc a:hover{color:var(--ink); border-color:var(--brand);}
nav.toc a:focus-visible, .ctrl:focus-visible, summary:focus-visible, .toc a:focus-visible{
  outline:3px solid var(--focus); outline-offset:2px;
}

.controls{display:flex; justify-content:flex-end; margin:0 0 16px;}
.ctrl{
  font:inherit; font-size:.85rem; font-weight:600; cursor:pointer;
  background:var(--surface); color:var(--ink); border:1px solid var(--line);
  border-radius:999px; padding:8px 16px;
}
.ctrl:hover{border-color:var(--brand);}

section{margin-bottom:46px;}
section > h2{
  font-size:1.15rem; letter-spacing:-.01em; margin:0 0 6px;
  display:flex; align-items:baseline; gap:10px;
}
section > h2 .badge{
  font-size:.72rem; font-weight:700; color:var(--brand-ink);
  background:color-mix(in srgb, var(--brand) 14%, transparent);
  border-radius:6px; padding:3px 8px; letter-spacing:.02em;
}
section > .sec-desc{color:var(--muted); font-size:.88rem; margin:0 0 18px;}

article.q{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  padding:22px 22px 18px; margin-bottom:16px;
}
article.q .qhead{display:flex; gap:12px; align-items:flex-start;}
article.q .qnum{
  flex:0 0 auto; font-size:.78rem; font-weight:700; color:var(--brand-ink);
  background:color-mix(in srgb, var(--brand) 13%, transparent);
  border-radius:8px; padding:3px 9px; margin-top:2px; min-width:34px; text-align:center;
}
article.q .qtext{font-weight:600; font-size:1.02rem; margin:0;}
ol.opts{list-style:none; counter-reset:opt; margin:16px 0 0; padding:0;}
ol.opts li{
  counter-increment:opt; position:relative; padding:11px 14px 11px 44px;
  background:color-mix(in srgb, var(--ink) 3%, transparent);
  border:1px solid transparent; border-radius:9px; margin-bottom:8px; font-size:.95rem;
}
ol.opts li::before{
  content:counter(opt); position:absolute; left:12px; top:50%; transform:translateY(-50%);
  width:22px; height:22px; border-radius:50%; border:1.5px solid var(--line);
  display:grid; place-items:center; font-size:.78rem; font-weight:700; color:var(--muted);
}
ol.opts li.is-answer{
  background:var(--ok-bg); border-color:var(--ok-line); color:var(--ok-ink); font-weight:600;
}
ol.opts li.is-answer::before{border-color:var(--ok-line); color:var(--ok-ink); background:transparent;}

details.ans{margin-top:14px; border-top:1px dashed var(--line); padding-top:14px;}
details.ans > summary{
  list-style:none; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
  font-weight:700; font-size:.88rem; color:var(--brand-ink);
  background:color-mix(in srgb, var(--brand) 10%, transparent);
  border-radius:8px; padding:8px 14px; user-select:none;
}
details.ans > summary::-webkit-details-marker{display:none;}
details.ans > summary::before{content:"▸"; transition:transform .15s;}
details.ans[open] > summary::before{transform:rotate(90deg);}
details.ans .body{
  margin-top:12px; padding:14px 16px; background:var(--ok-bg);
  border-left:4px solid var(--ok-line); border-radius:0 8px 8px 0; font-size:.92rem;
}
details.ans .body .a-label{font-weight:700; color:var(--ok-ink); display:block; margin-bottom:4px;}

pre.code{
  background:var(--code-bg); color:var(--code-ink); border-radius:9px;
  padding:14px 16px; overflow-x:auto; font-size:.85rem; line-height:1.5;
  font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace; margin:10px 0 0;
}
.note{font-size:.82rem; color:var(--muted); margin:0 0 16px;}
mjx-container{overflow-x:auto; overflow-y:hidden;}
</style>
</head>

<a class="skip" href="#main">본문 바로가기</a>
<div class="wrap">
  <header>
    <p class="eyebrow">데이터패턴인식</p>
    <h1>기말고사 총정리</h1>
    <p>모의고사 4회차 · 기출 족보 20문제 — 총 60문제</p>
  </header>

  <nav class="toc" aria-label="회차 바로가기">
    <a href="#s1">1회차</a>

  </nav>

  <div class="controls">
    <button class="ctrl" id="toggleAll" type="button" aria-pressed="false">정답 모두 펼치기</button>
  </div>

  <main id="main"></main>
</div>

<script>
const data = [
{ id:"s1", title:"1회차 모의고사", badge:"기본 개념", desc:"트랜스포머 · GAN · DDPM 기초", q:[
  {n:1, q:"트랜스포머 어텐션에서 쿼리(Q)·키(K)·밸류(V)의 역할로 가장 적절한 것은?",
   o:["Query는 위치 정보, Key·Value는 의미 정보를 담는다.","Query와 Key의 내적으로 연관성(어텐션 스코어)을 구한 뒤 Value를 조합해 문맥을 파악한다.","Key는 목표값, Query는 DB에 저장된 실제 데이터 값이다.","Value는 다음 단어 예측을 위한 정답(Ground Truth) 레이블이다."],
   a:2, e:"내가 찾는 쿼리(Q)와 데이터 키(K)의 유사도를 계산하고, 그 가중치로 밸류(V)를 가져오는 원리."},
  {n:2, q:"입력 임베딩에 포지셔널 인코딩을 더하는 가장 주요한 이유는?",
   o:["차원을 축소해 연산 속도를 높이려고","내적으로 단어 유사도를 쉽게 계산하려고","모든 단어를 병렬 처리하므로 위치(순서) 정보를 부여하려고","문장 길이를 일정 크기로 정규화하려고"],
   a:3, e:"트랜스포머는 순차 연산을 안 해 순서 정보가 사라지므로, 사인/코사인 등으로 위치 지문을 더한다."},
  {n:3, q:"GAN 학습 과정 설명으로 틀린 것은?",
   o:["생성자와 판별자가 경쟁하는 미니맥스 게임 구조이다.","판별자는 진짜와 가짜를 구분하도록 학습한다.","생성자는 진짜 데이터를 직접 입력받아 원본과 똑같이 복원하도록 학습한다.","손실 함수로 이진 교차 엔트로피(BCE)를 주로 쓴다."],
   a:3, e:"생성자는 진짜 데이터를 직접 보지 못한다. 랜덤 노이즈(z)만 입력받아 판별자 피드백으로 갱신된다."},
  {n:4, q:"DDPM 전방 과정(Forward, q-process) 설명으로 가장 적절한 것은?",
   o:["완전한 노이즈에서 시작해 점진적으로 노이즈를 제거해 원본을 복원한다.","원본 데이터에 정의된 스케줄에 따라 점진적으로 가우시안 노이즈를 추가한다.","입력을 저차원 잠재 공간으로 압축해 저장 공간을 최적화한다.","분류기로 생성 과정을 특정 방향으로 가이드한다."],
   a:2, e:"전방 과정은 원본에 노이즈 스케줄대로 점진적으로 노이즈를 주입해 오염시키는 과정."},
  {n:5, q:"LDM이 기본 DDPM과 구별되는 핵심 원리는?",
   o:["픽셀 공간이 아닌, VAE로 축소된 잠재 공간에서 노이즈 주입·제거를 수행한다.","전방 과정을 완전히 생략해 속도를 수천 배 높였다.","이미지 생성을 포기하고 텍스트만 생성하도록 트랜스포머로 대체했다.","한 스텝 만에 노이즈에서 완벽한 이미지를 만든다."],
   a:1, e:"픽셀 전체 연산은 비싸므로 VAE로 압축한 잠재 공간에서 디퓨전을 수행하는 게 핵심."},
  {n:6, q:"Grad-CAM이 기존 CAM 대비 갖는 가장 큰 장점은?",
   o:["검은색 패치로 가리며 비교하므로 직관적이다.","GAP 삽입 등 구조 변경 없이 기울기(Gradient)로 바로 적용 가능하다.","연산량이 10배 이상 줄어 실시간 분할에 쓸 수 있다.","CNN뿐 아니라 결정트리·SVM 등 모든 알고리즘에 적용된다."],
   a:2, e:"CAM은 GAP 레이어 삽입 등 구조 변경이 필요하지만, Grad-CAM은 역전파 기울기로 구조 변경 없이 적용."},
  {n:7, q:"가림 민감도(Occlusion Sensitivity) 설명으로 가장 적절한 것은?",
   o:["특정 영역을 패치로 가렸을 때 예측 확률 하락 정도로 중요도를 파악한다.","내부 가중치 행렬을 직접 분석해 활성화된 뉴런을 시각화한다.","노이즈를 점진적으로 더하며 원본이 사라지는 시점을 측정한다.","가짜 이미지가 실제와 픽셀 단위로 얼마나 다른지 측정한다."],
   a:1, e:"가렸을 때 판단 확률이 떨어지는 영역이 곧 판단의 핵심 근거라는 블랙박스 접근법."},
  {n:8, q:"MAML의 Inner Loop와 Outer Loop 역할로 알맞은 것은?",
   o:["Inner는 메타 파라미터를 갱신, Outer는 태스크 초기화 값을 찾는다.","Inner는 서포트 셋으로 태스크에 빠르게 적응, Outer는 쿼리 셋 손실로 메타 파라미터를 갱신한다.","둘 다 동일 데이터로 파라미터를 두 번 연속 갱신한다.","Inner는 생성자, Outer는 판별자를 학습한다."],
   a:2, e:"Inner는 모의고사(Support)로 적응, Outer는 실전(Query)으로 근본 능력(메타 파라미터)을 갱신."},
  {n:9, q:"AGI가 기존 ANI와 구별되는 핵심 특징은?",
   o:["처리 데이터양이 수십 배 늘어난 초거대 모델이다.","고정된 환경 내에서만 최적 효율을 내도록 설계됐다.","여러 환경에서 스스로 문제를 정의하며 '학습하는 방법' 자체를 터득한다.","정형 데이터만 처리해 예측의 완벽성을 보장한다."],
   a:3, e:"AGI는 새 환경·규칙에서도 메타 러닝으로 학습 방법을 터득하고 자율적으로 진화한다."},
  {n:10, q:"오토인코더 인코더·디코더 구조의 올바른 설명은?",
   o:["인코더는 차원을 축소해 특징을 압축, 디코더는 이를 바탕으로 원본을 재구성한다.","인코더는 노이즈로 가짜를 생성, 디코더는 진짜인지 판별한다.","인코더는 텍스트로 이미지를 렌더링, 디코더는 캡션을 단다.","인코더는 고해상도 이미지를 생성, 디코더는 노이즈를 추가한다."],
   a:1, e:"압축(인코딩) 후 복원(디코딩)으로 주요 특징(Latent)을 학습하는 비지도 학습."},
]},

{ id:"s2", title:"2회차 모의고사", badge:"세부 메커니즘", desc:"세부 동작 · 앙상블", q:[
  {n:11, q:"오토인코더 학습 목적·특성으로 가장 적절하지 않은 것은?",
   o:["인코더는 차원을 축소해 잠재 벡터를 추출한다.","디코더는 잠재 벡터로 원본과 최대한 동일하게 복원한다.","주로 지도 학습이며 사람이 라벨링한 정답이 대량 필요하다.","LDM은 이 VAE 구조로 데이터를 압축한 뒤 연산한다."],
   a:3, e:"오토인코더는 입력을 정답으로 삼는 자가지도(비지도) 학습이라 별도 라벨링이 필요 없다."},
  {n:12, q:"멀티 헤드 어텐션을 쓰는 가장 주된 이유는?",
   o:["행렬 곱을 여러 코어로 나눠 병렬 속도를 높이려고","다양한 문맥적 뉘앙스를 여러 관점에서 동시에 학습하려고","긴 문장을 조각내 하나씩 순차 처리하려고","어텐션 스코어가 커져 생기는 기울기 폭발을 막으려고"],
   a:2, e:"문법·화자·시점 등 한 문장 안의 여러 관점을 다각도로 파악하기 위해 멀티 헤드를 쓴다."},
  {n:13, q:"DDPM 역방향에서 로그 우도 대신 ELBO를 쓰는 근본 이유는?",
   o:["연쇄 확률 구조가 복잡해 실제 로그 우도를 직접 계산(Intractable)할 수 없어서","차원을 1차원으로 축소해 속도를 높이려고","마르코프 체인 없이 한 스텝으로 생성하려고","손실을 BCE로 쉽게 변환하려고"],
   a:1, e:"실제 로그 우도는 연쇄 확률 탓에 직접 계산 불가라, 유사 추세인 ELBO(VLB)를 최대화한다."},
  {n:14, q:"Occlusion Sensitivity에서 패치 크기 설정 설명으로 옳은 것은?",
   o:["크게 잡을수록 세밀한 근거를 얻는다.","너무 크면 어떤 부위가 중요한지 알기 어렵고 두루뭉술해진다.","1픽셀로 잡으면 연산이 가장 빠르다.","크기는 내부 가중치 행렬 크기에 맞춰 자동 고정된다."],
   a:2, e:"패치가 너무 크면 근거 파악이 부정확, 너무 작으면 연산량 급증이라 적절한 조절이 필요."},
  {n:15, q:"MAML 데이터 처리 설명 중 잘못된 것은?",
   o:["서포트 셋은 태스크에 빠르게 적응하는 '모의고사'다.","쿼리 셋은 갱신된 성능을 평가하는 '실전 시험'이다.","평가 시 서포트 셋과 쿼리 셋은 완전히 동일한 데이터를 써야 한다.","적은 데이터(Few-shot)로 새 환경에 적응할 초기 가중치 최적점을 찾는다."],

const main = document.getElementById('main');
data.forEach(sec=>{
  const s = document.createElement('section');
  s.id = sec.id;
  s.setAttribute('aria-labelledby', sec.id+'-h');
  let html = `<h2 id="${sec.id}-h">${sec.title}<span class="badge">${sec.badge}</span></h2>`;
  html += `<p class="sec-desc">${sec.desc}</p>`;
  sec.q.forEach(item=>{
    const opts = item.o.map((t,i)=>`<li${i===item.a-1?' class="is-answer"':''}>${t}</li>`).join('');
    const noteHtml = item.note?`<p class="note">${item.note}</p>`:'';
    const ansLabel = item.a>0?`정답 ${item.a}번`:'정답 확인 필요';
    html += `
    <article class="q">
      <div class="qhead">
        <span class="qnum">${item.n}</span>
        <p class="qtext">${item.q}</p>
      </div>
      ${noteHtml}
      <ol class="opts">${opts}</ol>
      <details class="ans">
        <summary>정답 및 해설</summary>
        <div class="body"><span class="a-label">${ansLabel}</span>${item.e}</div>
      </details>
    </article>`;
  });
  s.innerHTML = html;
  main.appendChild(s);
});

const btn = document.getElementById('toggleAll');
btn.addEventListener('click', ()=>{
  const open = btn.getAttribute('aria-pressed')==='false';
  document.querySelectorAll('details.ans').forEach(d=> d.open = open);
  btn.setAttribute('aria-pressed', String(open));
  btn.textContent = open ? '정답 모두 접기' : '정답 모두 펼치기';
});
</script>
</body>
</html>
